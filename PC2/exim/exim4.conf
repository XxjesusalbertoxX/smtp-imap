# =============================================
#  EXIM4 - exim.conf  (plantilla con envsubst)
# =============================================

# ── Identidad ─────────────────────────────────────────────────────────────────
primary_hostname = EXIM_MY_DOMAIN

# ── Dominios locales ──────────────────────────────────────────────────────────
domainlist local_domains = EXIM_MY_DOMAIN : localhost

# ── Dominios de relay (hacia el peer) ────────────────────────────────────────
domainlist relay_to_domains = EXIM_PEER_DOMAIN

# ── Redes autorizadas para enviar sin autenticacion ──────────────────────────
hostlist relay_from_hosts = 0.0.0.0/0

# ── Opciones generales ────────────────────────────────────────────────────────
never_users = root
daemon_smtp_ports = 25

# Sin TLS para practica LAN
tls_advertise_hosts =

# Logs a stdout
log_selector    = +all
log_file_path   = /dev/stdout

# ── ACL (control de acceso) ───────────────────────────────────────────────────
acl_smtp_rcpt  = acl_check_rcpt
acl_smtp_data  = acl_check_data

begin acl

acl_check_rcpt:
  accept hosts        = +relay_from_hosts
  accept domains      = +local_domains
  accept domains      = +relay_to_domains
  deny   message      = relay not permitted

acl_check_data:
  accept

# ── Routers ───────────────────────────────────────────────────────────────────
begin routers

# 1. Enrutar correo destinado al peer directamente a su IP
route_to_peer:
  driver    = manualroute
  domains   = +relay_to_domains
  route_list = EXIM_PEER_DOMAIN  EXIM_PEER_IP  byname
  transport = remote_smtp
  no_more

# 2. Entregar correo local via LMTP a Dovecot
local_delivery:
  driver    = manualroute
  domains   = +local_domains
  route_list = * dovecot byname
  transport = dovecot_lmtp
  no_more

# ── Transportes ───────────────────────────────────────────────────────────────
begin transports

# SMTP hacia el peer (puerto 25)
remote_smtp:
  driver          = smtp
  port            = 25
  hosts_try_auth  =

# LMTP hacia Dovecot (puerto 24)
dovecot_lmtp:
  driver          = lmtp
  socket          = /dev/null
  # Usamos TCP ya que Dovecot esta en un contenedor separado
  # Se sobreescribe en entrypoint con la config correcta

# ── Rewriters ─────────────────────────────────────────────────────────────────
begin rewrite

# ── Autenticadores ────────────────────────────────────────────────────────────
begin authenticators
