# =====================================================================
#  PC1 - docker-compose.yml
#  Servicios: Postfix (SMTP) + Dovecot (IMAP) + Roundcube (Web)
# =====================================================================

services:

  # ─────────────────────────────────────────────
  #  POSTFIX - Servidor SMTP
  # ─────────────────────────────────────────────
  postfix:
    build: ./postfix
    container_name: pc1_postfix
    restart: unless-stopped
    ports:
      - "25:25"
    environment:
      MY_IP:        ${MY_IP}
      MY_DOMAIN:    ${MY_DOMAIN}
      PEER_IP:      ${PEER_IP}
      PEER_DOMAIN:  ${PEER_DOMAIN}
      MAIL_USER:    ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    networks:
      mailnet:
        aliases:
          - postfix
    extra_hosts:
      - "${MY_DOMAIN}:${MY_IP}"
      - "${PEER_DOMAIN}:${PEER_IP}"

  # ─────────────────────────────────────────────
  #  DOVECOT - Servidor IMAP + entrega local (LMTP)
  # ─────────────────────────────────────────────
  dovecot:
    build: ./dovecot
    container_name: pc1_dovecot
    restart: unless-stopped
    ports:
      - "143:143"
    environment:
      MAIL_USER:     ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - maildata:/var/mail
    networks:
      - mailnet

  # ─────────────────────────────────────────────
  #  ROUNDCUBE - Cliente Web de Correo
  # ─────────────────────────────────────────────
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: pc1_roundcube
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      ROUNDCUBEMAIL_SKIN:         elastic
      ROUNDCUBEMAIL_DEFAULT_HOST: dovecot
      ROUNDCUBEMAIL_DEFAULT_PORT: 143
      ROUNDCUBEMAIL_SMTP_SERVER:  postfix
      ROUNDCUBEMAIL_SMTP_PORT:    25
      MY_DOMAIN:                  ${MY_DOMAIN}
    volumes:
      - ./roundcube/config.inc.php:/var/roundcube/config/config.inc.php
      - rcdata:/var/roundcube/db
    depends_on:
      - dovecot
      - postfix
    networks:
      mailnet:
        aliases:
          - roundcube
    extra_hosts:
      - "${MY_DOMAIN}:${MY_IP}"
      - "${PEER_DOMAIN}:${PEER_IP}"

# ─────────────────────────────────────────────
#  Redes
# ─────────────────────────────────────────────
networks:
  mailnet:
    driver: bridge

# ─────────────────────────────────────────────
#  Volumenes persistentes
# ─────────────────────────────────────────────
volumes:
  maildata:
    driver: local
  rcdata:
    driver: local
