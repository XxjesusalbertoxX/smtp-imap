# =============================================
#  DOVECOT - dovecot.conf
#  Valido para PC1 (Postfix) y PC2 (Exim)
# =============================================

# Protocolos habilitados
protocols = imap lmtp

# Escuchar en todas las interfaces
listen = *

# ── Ubicacion del correo ──────────────────────────────────────────────────────
mail_location = maildir:/var/mail/%u/Maildir

# ── Autenticacion ─────────────────────────────────────────────────────────────
auth_mechanisms = plain login

passdb {
  driver = passwd-file
  args   = /etc/dovecot/users
}

userdb {
  driver = passwd-file
  args   = /etc/dovecot/users
  default_fields = uid=vmail gid=vmail home=/var/mail/%u
}

# ── Servicios ─────────────────────────────────────────────────────────────────
service imap-login {
  inet_listener imap {
    port = 143
  }
}

service lmtp {
  inet_listener lmtp {
    port = 24
  }
  # Permisos para que postfix/exim puedan entregar
  user = root
}

service auth {
  unix_listener auth-userdb {
    mode  = 0600
    user  = root
    group = root
  }
}

# ── SSL deshabilitado (practica LAN, sin certificados) ────────────────────────
ssl = no
disable_plaintext_auth = no

# ── Namespace de correo ───────────────────────────────────────────────────────
namespace inbox {
  inbox = yes
  separator = /
  mailbox INBOX {
    auto = subscribe
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
}

# ── Logs ──────────────────────────────────────────────────────────────────────
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout
